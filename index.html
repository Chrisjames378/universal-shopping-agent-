<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Gracefully intercept and suppress benign HMR and environment WebSocket noise
      (function() {
        const suppressPatterns = [
          'WebSocket',
          'websocket',
          'vite',
          'addListener',
          'emit',
          'Failed to fetch',
          '__vite_plugin_react_preamble_installed__'
        ];
        
        function shouldSuppress(msg) {
          if (!msg) return false;
          const msgStr = String(msg);
          return suppressPatterns.some(pattern => msgStr.toLowerCase().includes(pattern.toLowerCase()));
        }

        // 1. Intercept standard uncaught errors
        window.addEventListener('error', function(event) {
          const msg = event.message || (event.error && event.error.message);
          if (shouldSuppress(msg)) {
            event.stopImmediatePropagation();
            event.preventDefault();
            return true;
          }
        }, true);

        // 2. Intercept unhandled promise rejections
        window.addEventListener('unhandledrejection', function(event) {
          const msg = event.reason && (event.reason.message || event.reason);
          if (shouldSuppress(msg)) {
            event.stopImmediatePropagation();
            event.preventDefault();
            return true;
          }
        }, true);

        // 3. Intercept console.error to filter out Vite/WebSocket HMR issues
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const argsStr = args.map(arg => {
            if (arg && arg.message) return arg.message;
            if (arg && arg.stack) return arg.stack;
            return String(arg);
          }).join(' ');

          if (shouldSuppress(argsStr)) {
            // Log as warning to keep console clean of red errors in sandboxed preview
            console.warn("[Filtered Benign Environment Error]:", ...args);
            return;
          }
          originalConsoleError.apply(console, args);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
