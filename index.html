<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Gracefully intercept and suppress benign HMR and environment WebSocket noise
      (function() {
        const suppressPatterns = [
          'WebSocket',
          'websocket',
          'vite',
          'addListener',
          'emit',
          'Failed to fetch',
          '__vite_plugin_react_preamble_installed__'
        ];
        
        function shouldSuppress(msg) {
          if (!msg) return false;
          const msgStr = String(msg);
          return suppressPatterns.some(pattern => msgStr.toLowerCase().includes(pattern.toLowerCase()));
        }

        // Intercept WebSocket creation to bypass browser-level connection failures for HMR
        if (window.WebSocket) {
          const OriginalWebSocket = window.WebSocket;
          const MockWebSocket = function(url, protocols) {
            if (typeof url === 'string' && (url.includes('/vite') || url.includes('24678') || url.includes('hmr') || url.includes('ws://') || url.includes('wss://'))) {
              const dummy = {
                url: url,
                readyState: 1, // OPEN (Simulate successful connection)
                bufferedAmount: 0,
                extensions: '',
                protocol: '',
                binaryType: 'blob',
                onopen: null,
                onerror: null,
                onclose: null,
                onmessage: null,
                send: function() {},
                close: function() {
                  dummy.readyState = 3; // CLOSED
                },
                addEventListener: function(type, listener) {
                  if (type === 'open') {
                    setTimeout(() => {
                      const ev = { type: 'open', target: dummy };
                      if (listener) listener(ev);
                      if (dummy.onopen) dummy.onopen(ev);
                    }, 50);
                  }
                },
                removeEventListener: function() {},
                dispatchEvent: function() { return true; }
              };
              return dummy;
            }
            if (protocols) {
              return new OriginalWebSocket(url, protocols);
            }
            return new OriginalWebSocket(url);
          };
          MockWebSocket.prototype = OriginalWebSocket.prototype;
          window.WebSocket = MockWebSocket;
          
          window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING || 0;
          window.WebSocket.OPEN = OriginalWebSocket.OPEN || 1;
          window.WebSocket.CLOSING = OriginalWebSocket.CLOSING || 2;
          window.WebSocket.CLOSED = OriginalWebSocket.CLOSED || 3;
        }

        // 1. Intercept standard uncaught errors
        window.addEventListener('error', function(event) {
          const msg = event.message || (event.error && event.error.message);
          if (shouldSuppress(msg)) {
            event.stopImmediatePropagation();
            event.preventDefault();
            return true;
          }
        }, true);

        // 2. Intercept unhandled promise rejections
        window.addEventListener('unhandledrejection', function(event) {
          const msg = event.reason && (event.reason.message || event.reason);
          if (shouldSuppress(msg)) {
            event.stopImmediatePropagation();
            event.preventDefault();
            return true;
          }
        }, true);

        // 3. Intercept console.error to filter out Vite/WebSocket HMR issues
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const argsStr = args.map(arg => {
            if (arg && arg.message) return arg.message;
            if (arg && arg.stack) return arg.stack;
            return String(arg);
          }).join(' ');

          if (shouldSuppress(argsStr)) {
            return;
          }
          originalConsoleError.apply(console, args);
        };

        // 4. Intercept console.warn to filter out warnings of the same issues
        const originalConsoleWarn = console.warn;
        console.warn = function(...args) {
          const argsStr = args.map(arg => {
            if (arg && arg.message) return arg.message;
            if (arg && arg.stack) return arg.stack;
            return String(arg);
          }).join(' ');

          if (shouldSuppress(argsStr)) {
            return;
          }
          originalConsoleWarn.apply(console, args);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
